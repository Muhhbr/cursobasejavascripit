<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 9 - Eventos</title>
    <style>
        .borda-especial {
            border: 4px solid red;
            border-radius: 10px;
        }
        .imagem {
            width: 300px;
            transition: 0.3s;
        }
        input, button {
            font-size: 16px;
            padding: 8px;
            margin: 5px;
        }
        .feedback {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Eventos no Navegador</h1>

   
    <h2>1. Botão que muda texto do parágrafo</h2>
    <p id="paragrafo1">Texto original</p>
    <button id="botaoMudaTexto">Mudar Texto</button>

    <hr>


    <h2>2. Capturar texto digitado em tempo real</h2>
    <input type="text" id="meuInput" placeholder="Digite algo...">
    <div id="feedback" class="feedback"></div>

    <hr>


    <h2>3. Trocar borda da imagem ao passar o mouse</h2>
    <img id="minhaImagem" class="imagem" src="https://picsum.photos/id/1/300/200" alt="Exemplo">

    <script src="script.js"></script>
</body>
</html>
